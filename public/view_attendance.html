<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f4f4f4;
        }
        h3 { color: #2c3e50; }
        .controls {
            margin-bottom: 20px;
        }
        .controls input {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-right: 8px;
        }
        .controls button {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 6px;
        }
        .controls button:hover { background: #2980b9; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #3498db; color: white; }
        td { background-color: #ecf0f1; }
        #totalCount {
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h3>Attendance for Today</h3>

    <div class="controls">
        <input type="text" id="classroomInput" placeholder="Classroom ID (e.g. AB3)">
        <button onclick="loadAttendance()">Load</button>
        <button onclick="downloadCSV()">Download CSV</button>
    </div>

    <div id="totalCount"></div>
    <div id="attendanceContent"></div>

    <script>
        let attendanceData = [];

        async function loadAttendance() {
            const classroom = document.getElementById('classroomInput').value.trim();
            if (!classroom) return alert('Enter classroom ID.');

            const res = await fetch('/api/faculty-view-attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ classroom })
            });
            const data = await res.json();

            if (data.success) {
                attendanceData = data.attendance;

                if (attendanceData.length === 0) {
                    document.getElementById('attendanceContent').innerHTML =
                        '<p>No attendance records found for this classroom today.</p>';
                    document.getElementById('totalCount').textContent = '';
                    return;
                }

                document.getElementById('totalCount').textContent =
                    `Total students present: ${attendanceData.length}`;

                let html = `<table>
                    <tr>
                        <th>S.No</th>
                        <th>Reg Number</th>
                        <th>Name</th>
                        <th>Time</th>
                    </tr>`;
                attendanceData.forEach((s, i) => {
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${s.reg_number}</td>
                        <td>${s.name}</td>
                        <td>${s.time}</td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('attendanceContent').innerHTML = html;
            } else {
                document.getElementById('attendanceContent').innerHTML =
                    '<p>Error fetching attendance.</p>';
            }
        }

        function downloadCSV() {
            if (!attendanceData.length) return alert('Load attendance first.');

            const classroom = document.getElementById('classroomInput').value.trim();
            const date = new Date().toISOString().split('T')[0];

            let csv = 'S.No,Reg Number,Name,Time\n';
            attendanceData.forEach((s, i) => {
                csv += `${i + 1},${s.reg_number},${s.name},${s.time}\n`;
            });
            csv += `\nTotal Students,${attendanceData.length}\n`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Attendance_${classroom}_${date}.csv`;
            a.click();
        }
    </script>
</body>
</html>
