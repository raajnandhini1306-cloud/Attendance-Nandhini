<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Attendance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }
        th { background-color: #3498db; color: white; }
        td { background-color: #ecf0f1; }
        #noData {
            text-align: center;
            font-size: 18px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <h2>Your Attendance Records</h2>
    <div id="attendanceTable"></div>

    <script>
        async function loadStudentAttendance() {
            const reg_number = localStorage.getItem('reg_number');
            if (!reg_number) {
                document.getElementById('attendanceTable').innerHTML =
                    '<p id="noData">Please log in first.</p>';
                return;
            }

            const res = await fetch('/api/view-attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reg_number })
            });
            const data = await res.json();

            if (data.success && data.attendance.length > 0) {
                let html = `<table>
                    <tr>
                        <th>S.No</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Classroom</th>
                        <th>Status</th>
                    </tr>`;
                data.attendance.forEach((r, i) => {
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${r.date}</td>
                        <td>${r.time}</td>
                        <td>${r.classroom}</td>
                        <td>${r.status}</td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('attendanceTable').innerHTML = html;
            } else {
                document.getElementById('attendanceTable').innerHTML =
                    '<p id="noData">No attendance records found.</p>';
            }
        }

        loadStudentAttendance();
    </script>
</body>
</html>
